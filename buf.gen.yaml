version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/racass-pixel/quick-protocol/gen/go
plugins:
  - local: protoc-gen-go
    out: gen/go
    opt: paths=source_relative
  - local: protoc-gen-connect-go
    out: gen/go
    opt: paths=source_relative
  - local:
      - node
      - tools/node_modules/@bufbuild/protoc-gen-es/bin/protoc-gen-es
    out: gen/ts/src
    opt:
      - target=ts
      - import_extension=js
