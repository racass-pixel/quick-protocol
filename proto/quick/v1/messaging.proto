syntax = "proto3";
package quick.v1;
import "google/protobuf/timestamp.proto";
import "quick/v1/users.proto";

service Messaging {
  rpc ListConversations(ListConversationsRequest)     returns (ListConversationsResponse)     {}
  rpc OpenDM(OpenDMRequest)                           returns (OpenDMResponse)                {}
  rpc ListMessages(ListMessagesRequest)               returns (ListMessagesResponse)          {}
  rpc SendMessage(SendMessageRequest)                 returns (SendMessageResponse)           {}
  rpc MarkRead(MarkReadRequest)                       returns (MarkReadResponse)              {}
  rpc CreateGroup(CreateGroupRequest)                 returns (CreateGroupResponse)           {}
  rpc CreateChannel(CreateChannelRequest)             returns (CreateChannelResponse)         {}
  rpc AddMembers(AddMembersRequest)                   returns (AddMembersResponse)            {}
  rpc RemoveMember(RemoveMemberRequest)               returns (RemoveMemberResponse)          {}
  rpc LeaveConversation(LeaveConversationRequest)     returns (LeaveConversationResponse)     {}
  rpc ListMembers(ListMembersRequest)                 returns (ListMembersResponse)           {}

  // S10 — TG parity additions.
  rpc DeleteConversation(DeleteConversationRequest)   returns (DeleteConversationResponse)    {}
  rpc EditMessage(EditMessageRequest)                 returns (EditMessageResponse)           {}
  rpc DeleteMessage(DeleteMessageRequest)             returns (DeleteMessageResponse)         {}
  rpc PinMessage(PinMessageRequest)                   returns (PinMessageResponse)            {}
  rpc UnpinMessage(UnpinMessageRequest)               returns (UnpinMessageResponse)          {}
  rpc GetMessageReaders(GetMessageReadersRequest)     returns (GetMessageReadersResponse)     {}
  rpc PinConversation(PinConversationRequest)         returns (PinConversationResponse)       {}
  rpc UnpinConversation(UnpinConversationRequest)     returns (UnpinConversationResponse)     {}

  // S11 — voice messages. Upload itself is a multipart HTTP POST to /v1/media/voice
  // (not RPC — Connect-RPC is awkward for binary streams). That endpoint returns
  // {file_id, url, duration_ms, peaks}. Then the client calls SendVoiceMessage
  // which writes a kind='voice' message into the thread referencing the file_id.
  rpc SendVoiceMessage(SendVoiceMessageRequest)       returns (SendVoiceMessageResponse)       {}
  rpc MarkVoicePlayed(MarkVoicePlayedRequest)         returns (MarkVoicePlayedResponse)        {}

  // S13 — replies, reactions, forwards, attachments, full-text search.
  rpc AddReaction(AddReactionRequest)                 returns (AddReactionResponse)            {}
  rpc RemoveReaction(RemoveReactionRequest)           returns (RemoveReactionResponse)         {}
  rpc ListReactions(ListReactionsRequest)             returns (ListReactionsResponse)          {}
  rpc ForwardMessage(ForwardMessageRequest)           returns (ForwardMessageResponse)         {}
  rpc SearchMessages(SearchMessagesRequest)           returns (SearchMessagesResponse)         {}
}

message Conversation {
  string id    = 1;
  string type  = 2;
  string title = 3;
  User   peer  = 4;
  google.protobuf.Timestamp last_message_at = 5;
  Message preview = 6;
  int32  unread_count = 7;
  int32  member_count = 8;
  string avatar_color = 9;
  string my_role = 10;
}

message Message {
  string id              = 1;
  string conversation_id = 2;
  string sender_id       = 3;
  string body            = 4;
  google.protobuf.Timestamp created_at = 5;

  // Voice attachment, populated by backend when this is a voice message.
  // body is empty in that case. S11.
  Voice voice = 6;

  // S13 — reply quote. When set, this message is a reply to another message
  // in the same conversation. Client renders an inline preview.
  string reply_to_message_id = 7;

  // S13 — reactions on this message. Populated by ListMessages / SendMessage
  // / WS message envelopes. One entry per (user_id, emoji) pair.
  repeated Reaction reactions = 8;

  // S13 — forward attribution. Populated when this message was forwarded from
  // another message. Telegram-style: only one level deep — forwarding an
  // already-forwarded message preserves the ORIGINAL forward_from_* values.
  string forward_from_user_id    = 9;
  string forward_from_message_id = 10;
  // forward_origin_text is a pre-formatted attribution string the client can
  // render directly (e.g. "Forwarded from @handle"). Empty when not a forward.
  string forward_origin_text     = 11;

  // S13 — generic attachments (images, files). Voice still uses the dedicated
  // Voice field for backward compatibility; attachments is for everything else.
  repeated Attachment attachments = 12;
}

message Reaction {
  string user_id = 1;
  string emoji   = 2;
}

message Attachment {
  string file_id        = 1;
  // kind: "image" | "file" | "voice" (voice mirrored here for completeness).
  string kind           = 2;
  string mime           = 3;
  int64  size_bytes     = 4;
  // Set for kind="image". Original-image dimensions in pixels.
  int32  width          = 5;
  int32  height         = 6;
  // Signed URL for the original blob (used by client to render / download).
  string url            = 7;
  // Signed URL of the 256-wide JPEG thumbnail. Only set for kind="image".
  string thumbnail_url  = 8;
  // Display filename (the original upload filename). Set primarily for
  // kind="file".
  string filename       = 9;
}

message Voice {
  string file_id     = 1;     // immutable id for the underlying media row
  string url         = 2;     // signed/scoped URL the client fetches the blob from
  int32  duration_ms = 3;     // total length in milliseconds
  repeated int32 peaks = 4;   // 64 normalised amplitude values 0-255 for the waveform
  bool   played      = 5;     // server view: true if THIS reader has already played it
}

message OpenDMRequest  { string user_id = 1; }
message OpenDMResponse { Conversation conversation = 1; }

message ListConversationsRequest  {}
message ListConversationsResponse { repeated Conversation conversations = 1; }

// before_id and after_id are mutually exclusive cursor controls.
// before_id loads older messages (paging upward through history).
// after_id loads newer messages (catching up on missed messages).
// Both absent = newest page.
message ListMessagesRequest  {
  string conversation_id = 1;
  string before_id       = 2;
  int32  limit           = 3;
  string after_id        = 4;
}
message ListMessagesResponse { repeated Message messages = 1; bool has_more = 2; }

message SendMessageRequest  {
  string conversation_id = 1;
  string body            = 2;
  // S13. Optional. If set, must reference a message in the same conversation.
  string reply_to_message_id = 3;
  // S13. Optional. Ids of previously-uploaded media_attachments rows owned by
  // the caller. Used for image/file attachments.
  repeated string attachment_file_ids = 4;
}
message SendMessageResponse { Message message = 1; }

message MarkReadRequest  { string conversation_id = 1; string last_message_id = 2; }
message MarkReadResponse {}

message CreateGroupRequest  { string title = 1; repeated string member_user_ids = 2; }
message CreateGroupResponse { Conversation conversation = 1; }

message CreateChannelRequest  { string title = 1; repeated string subscriber_user_ids = 2; }
message CreateChannelResponse { Conversation conversation = 1; }

message AddMembersRequest  { string conversation_id = 1; repeated string user_ids = 2; }
message AddMembersResponse {}

message RemoveMemberRequest  { string conversation_id = 1; string user_id = 2; }
message RemoveMemberResponse {}

message LeaveConversationRequest  { string conversation_id = 1; }
message LeaveConversationResponse {}

message ListMembersRequest  { string conversation_id = 1; }
message ListMembersResponse { repeated Member members = 1; }

message Member {
  User user = 1;
  string role = 2;
  google.protobuf.Timestamp joined_at = 3;
}

// --- S10 — TG parity additions ---

// Extra fields on Message for edited/deleted/pinned/service status.
// We do NOT modify the Message struct (field numbers already used) — instead
// the WS envelopes carry the diff via dedicated kinds (message_edited,
// message_deleted, message_pinned, service_message).

message DeleteConversationRequest {
  string conversation_id = 1;
  bool   for_everyone    = 2;     // DM: also delete on peer's side; group/channel: owner-only full delete
}
message DeleteConversationResponse {}

message EditMessageRequest  {
  string message_id = 1;
  string body       = 2;
}
message EditMessageResponse { Message message = 1; }

message DeleteMessageRequest  {
  string message_id   = 1;
  bool   for_everyone = 2;
}
message DeleteMessageResponse {}

message PinMessageRequest  { string message_id = 1; }
message PinMessageResponse {}

message UnpinMessageRequest  { string message_id = 1; }
message UnpinMessageResponse {}

message MessageReader {
  User user = 1;
  google.protobuf.Timestamp read_at = 2;
}
message GetMessageReadersRequest  { string message_id = 1; }
message GetMessageReadersResponse { repeated MessageReader readers = 1; }

message PinConversationRequest  { string conversation_id = 1; }
message PinConversationResponse {}

message UnpinConversationRequest  { string conversation_id = 1; }
message UnpinConversationResponse {}

// --- S11 — voice messages ---

message SendVoiceMessageRequest {
  string conversation_id = 1;
  string voice_file_id   = 2;  // returned by POST /v1/media/voice
}
message SendVoiceMessageResponse { Message message = 1; }

message MarkVoicePlayedRequest  { string message_id = 1; }
message MarkVoicePlayedResponse {}

// --- S13 — reactions, forwards, search ---

message AddReactionRequest {
  string message_id = 1;
  string emoji      = 2;
}
message AddReactionResponse {}

message RemoveReactionRequest {
  string message_id = 1;
  string emoji      = 2;
}
message RemoveReactionResponse {}

message ListReactionsRequest  { string message_id = 1; }
message ListReactionsResponse { repeated Reaction reactions = 1; }

message ForwardMessageRequest {
  string source_message_id      = 1;
  string target_conversation_id = 2;
}
message ForwardMessageResponse { Message message = 1; }

message SearchMessagesRequest {
  string query = 1;
  // Optional. If set, search is scoped to this conversation. Otherwise the
  // search covers every conversation the caller is a member of.
  string conversation_id = 2;
  int32  limit           = 3;
  // Cursor for paging older matches. Returns rows older than this message id.
  string before_id       = 4;
}
message SearchMessagesResponse { repeated Message messages = 1; bool has_more = 2; }
