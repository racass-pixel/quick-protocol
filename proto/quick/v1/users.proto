syntax = "proto3";
package quick.v1;

import "google/protobuf/timestamp.proto";
import "quick/v1/crypto.proto";

service Users {
  rpc Me(MeRequest)                       returns (MeResponse)            {}
  rpc UpdateProfile(UpdateProfileRequest) returns (UpdateProfileResponse) {}
  rpc Search(SearchRequest)               returns (SearchResponse)        {}
  rpc Block(BlockRequest)                 returns (BlockResponse)         {}
  rpc Unblock(UnblockRequest)             returns (UnblockResponse)       {}
  rpc ListBlocked(ListBlockedRequest)     returns (ListBlockedResponse)   {}
  rpc GetPresence(GetPresenceRequest)     returns (GetPresenceResponse)   {}

  // End-to-end encryption: identity key publishing + lookup.
  // Clients call UploadIdentityKey once on first launch after key generation;
  // re-upload only when the user wipes local storage and re-onboards.
  rpc UploadIdentityKey(UploadIdentityKeyRequest) returns (UploadIdentityKeyResponse) {}
  rpc GetIdentityKey(GetIdentityKeyRequest)       returns (GetIdentityKeyResponse)   {}
  rpc GetIdentityKeys(GetIdentityKeysRequest)     returns (GetIdentityKeysResponse)  {}
}

message User {
  string id            = 1;
  string handle        = 2;
  string display_name  = 3;
  string avatar_color  = 4;
  google.protobuf.Timestamp last_seen_at = 5;
  string bio           = 6;
}

message MeRequest {}
message MeResponse { User user = 1; }

message UpdateProfileRequest {
  optional string display_name = 1;
  optional string handle       = 2;
  optional string bio          = 3;
}
message UpdateProfileResponse { User user = 1; }

message SearchRequest  { string handle_prefix = 1; int32 limit = 2; }
message SearchResponse { repeated User users = 1; }

message BlockRequest    { string user_id = 1; }
message BlockResponse   {}
message UnblockRequest  { string user_id = 1; }
message UnblockResponse {}
message ListBlockedRequest  {}
message ListBlockedResponse { repeated User users = 1; }

message Presence {
  string user_id = 1;
  bool   online  = 2;
  google.protobuf.Timestamp last_seen_at = 3;
}

message GetPresenceRequest  { repeated string user_ids = 1; }
message GetPresenceResponse { repeated Presence presence = 1; }

// --- E2E identity key RPCs ---

message UploadIdentityKeyRequest  { bytes public_key = 1; }
message UploadIdentityKeyResponse {}

message GetIdentityKeyRequest  { string user_id = 1; }
message GetIdentityKeyResponse { IdentityKey identity_key = 1; }

message GetIdentityKeysRequest  { repeated string user_ids = 1; }
message GetIdentityKeysResponse { repeated IdentityKey identity_keys = 1; }
